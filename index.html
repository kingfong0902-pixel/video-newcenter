<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>影片載入中...</title>
    <style>
        /* 簡單的排版，讓畫面看起來更專業 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f5f5f7; }
        .loader { text-align: center; }
    </style>
</head>
<body>
    <div class="loader">
        <h2 id="status">正在導向至影片...</h2>
    </div>

    <script>
        async function startRedirect() {
            const urlParams = new URLSearchParams(window.location.search);
            const videoKey = urlParams.get('v'); // 取得網址中 ?v= 之後的代號

            if (!videoKey) {
                document.getElementById('status').innerHTML = "<h1>請提供影片代碼</h1>";
                return;
            }

            try {
                // 直接讀取跟 index.html 同資料夾下的 videos.json
                // 加上日期參數是為了防止瀏覽器快取舊資料，確保讀到最新版
                const response = await fetch('videos.json?t=' + new Date().getTime());
                const videoMap = await response.json();

                if (videoMap[videoKey]) {
                    // 執行跳轉
                    window.location.replace("https://www.youtube.com/watch?v=" + videoMap[videoKey].trim());
                } else {
                    document.getElementById('status').innerHTML = "<h1>找不到該影片 (代碼: " + videoKey + ")</h1>";
                }
            } catch (error) {
                console.error("讀取清單失敗:", error);
                document.getElementById('status').innerHTML = "<h1>系統同步中，請稍後再試</h1>";
            }
        }

        startRedirect();
    </script>
</body>
</html>
